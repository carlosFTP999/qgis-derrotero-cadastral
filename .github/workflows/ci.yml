name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff==0.15.20
      - name: Run ruff check
        run: ruff check src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:latest
      options: --entrypoint ""
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          pip3 install --break-system-packages -q \
            --ignore-installed "pytest>=8.3,<10" \
            "pytest-qgis>=4,<5" 2>/dev/null || \
          PIP_REQUIRE_VIRTUALENV=false pip3 install -q \
            --ignore-installed "pytest>=8.3,<10" \
            "pytest-qgis>=4,<5"

      - name: Run tests
        run: xvfb-run pytest tests/ -v
