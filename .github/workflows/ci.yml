name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff==0.15.20
      - name: Run ruff check
        run: ruff check src/

  test:
    name: Tests (QGIS ${{ matrix.qgis-label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - qgis-image: qgis/qgis:release-3_34
            qgis-label: "3.34 LTR"
          - qgis-image: qgis/qgis:latest
            qgis-label: latest
    container:
      image: ${{ matrix.qgis-image }}
      options: --entrypoint ""
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          pip3 install --break-system-packages -q \
            pytest==9.0.3 \
            pytest-qgis==4.0.1

      - name: Run tests
        run: xvfb-run pytest tests/ -v
